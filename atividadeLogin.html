<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="atividadeEstilo.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cal+Sans&family=Tagesschrift&display=swap" rel="stylesheet">
    <title>Login in Classroom</title>
</head>
<body>
    <main>
        <div class="login">     
            <form action="#" method="post">
                <div class="box2">
                    <label for="email">E-mail:</label>
                    <input 
                    required
                    type="email" 
                    name="email" 
                    id="email" 
                    placeholder="xxx@xxxmail.com">

                    <br>
                    <br>

                    <label for="senha">Senha: </label>
                    <input
                    required
                    type="password"
                    name="senha"
                    id="senha"
                    placeholder="********"
                    minlength="8">
                    <p><a href="esqueceuaSenha.html">Esqueceu a senha?</a></p>
                </div>
                    <div class="box">
                        <p class="button">
                            <button type="sumbit">Entrar</button>
                        </p>
                        <p class="button">
                            <button type="reset">Limpar</button>
                        </p>
                    </div>    
            </form>
        </div>
    </main>
</body>
</html>
